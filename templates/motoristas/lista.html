{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between mb-3">
    <h2>Motoristas</h2>
    <a href="{% url 'criar_motorista' %}" class="btn btn-primary">+ Novo Motorista</a>
</div>

<table class="table table-striped table-hover">
    <thead class="table-dark">
        <tr>
            <th>Nome</th>
            <th>Telefone</th>
            <th>Email</th>
            <th>CNH</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody>
        {% for m in motoristas %}
        <tr>
            <td>{{ m.nome }}</td>
            <td>{{ m.telefone }}</td>
            <td>{{ m.email }}</td>
            <td>{{ m.cnh }}</td>
            <td>
                <a href="{% url 'editar_motorista' m.id %}" class="btn btn-warning btn-sm">Editar</a>
                <a href="{% url 'deletar_motorista' m.id %}" class="btn btn-danger btn-sm">Excluir</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3" class="text-center">Nenhum motorista cadastrado</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
