{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between mb-3">
    <h2>Veículos</h2>
    <a href="{% url 'criar_veiculo' %}" class="btn btn-primary">+ Novo Veículo</a>
</div>

<table class="table table-hover table-bordered">
    <thead class="table-dark">
        <tr>
            <th>Placa</th>
            <th>Modelo</th>
            <th>Motorista</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody>
        {% for v in veiculos %}
        <tr>
            <td>{{ v.placa }}</td>
            <td>{{ v.modelo }}</td>
            <td>{{ v.motorista }}</td>
            <td>
                <a href="{% url 'editar_veiculo' v.id %}" class="btn btn-warning btn-sm">Editar</a>
                <a href="{% url 'deletar_veiculo' v.id %}" class="btn btn-danger btn-sm">Excluir</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" class="text-center">Nenhum veículo cadastrado</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
