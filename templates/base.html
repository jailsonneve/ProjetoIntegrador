<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f4f6f9;
        display: flex;
      }

      .sidebar {
        background: #212529;
        color: white;
        min-height: 100vh;
        padding: 20px;
      }

      .main-content {
        flex: 1;
      }

      .sidebar a {
        color: #adb5bd;
        display: block;
        padding: 10px;
        text-decoration: none;
        border-radius: 5px;
      }

      .sidebar a:hover {
        background: #343a40;
        color: white;
      }

      .card {
        border-radius: 10px;
      }

      .user-box {
        background: #2c3034;
        border: 1px solid #3d4348;
      }

      .user-icon {
        font-size: 2rem;
        color: #0d6efd;
      }

      .config-link {
        margin-bottom: 10px;
      }

      .logout-btn {
        border-radius: 10px;
        padding: 10px;
        font-weight: 600;
        transition: 0.2s;
      }

      .logout-btn:hover {
        transform: scale(1.02);
      }
      .sidebar a {
        color: #adb5bd;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 15px;
        text-decoration: none;
        border-radius: 12px;
        margin-bottom: 8px;
        transition: all 0.2s ease;
        font-weight: 500;
      }

      .sidebar a:hover {
        background: #343a40;
        color: white;
        transform: translateX(3px);
      }

      .sidebar a.active {
        background: linear-gradient(135deg, #0d6efd, #0b5ed7);
        color: white;
        box-shadow: 0 4px 12px rgba(13, 110, 253, 0.35);
      }

      .sidebar a.active i {
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="container-fluid">
      <div class="row">
        <!-- SIDEBAR -->
        <div
          class="col-md-2 sidebar d-flex flex-column justify-content-between"
        >
          <div>
            <!-- LOGO -->
            <h4 class="text-white mb-4">
              <i class="bi bi-bus-front"></i> Sistema
            </h4>

            <!-- USUÁRIO LOGADO -->
            <div class="user-box mb-4 p-3 rounded">
              <div class="d-flex align-items-center gap-2">
                <div class="user-icon">
                  <i class="bi bi-person-circle"></i>
                </div>

                <div>
                  <strong>{{ request.user.username }}</strong>

                  <br />

                  <small class="text-light-emphasis">
                    {{ request.user.email }}
                  </small>
                </div>
              </div>
            </div>

            <!-- MENU -->
            <a
              href="/"
              class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
            >
              <i class="bi bi-speedometer2"></i> Dashboard
            </a>

            <a
              href="/clientes/"
              class="{% if request.resolver_match.url_name == 'lista_clientes' %}active{% endif %}"
            >
              <i class="bi bi-people"></i> Clientes
            </a>

            <a
              href="/motoristas/"
              class="{% if request.resolver_match.url_name == 'lista_motoristas' %}active{% endif %}"
            >
              <i class="bi bi-person"></i> Motoristas
            </a>

            <a
              href="/veiculos/"
              class="{% if request.resolver_match.url_name == 'lista_veiculos' %}active{% endif %}"
            >
              <i class="bi bi-truck"></i> Veículos
            </a>

            <a
              href="/rotas/"
              class="{% if request.resolver_match.url_name == 'lista_rotas' %}active{% endif %}"
            >
              <i class="bi bi-map"></i> Rotas
            </a>

            <a
              href="/fornecedores/"
              class="{% if request.resolver_match.url_name == 'lista_fornecedores' %}active{% endif %}"
            >
              <i class="bi bi-box"></i> Fornecedores
            </a>

            <a
              href="/diario/"
              class="{% if request.resolver_match.url_name == 'lista_diario' %}active{% endif %}"
            >
              <i class="bi bi-journal"></i> Diário
            </a>
          </div>

          <!-- FOOTER SIDEBAR -->
          <div>
            <!-- PERFIL -->
            <a
              href="/perfil/"
              class="config-link {% if request.resolver_match.url_name == 'perfil' %}active{% endif %}"
            >
              <i class="bi bi-gear"></i>
              Configurações
            </a>

            <!-- LOGOUT -->
            <form action="{% url 'logout' %}" method="post">
              {% csrf_token %}

              <button class="btn btn-danger logout-btn w-100">
                <i class="bi bi-box-arrow-right"></i>
                Sair do Sistema
              </button>
            </form>
          </div>
        </div>

        <!-- CONTEÚDO -->
        <div class="col-md-10 p-4">{% block content %}{% endblock %}</div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
