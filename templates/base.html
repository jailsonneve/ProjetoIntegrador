<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
            display: flex;
        }

        .sidebar {
            background: #212529;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .main-content {
            flex: 1;
        }   

        .sidebar a {
            color: #adb5bd;
            display: block;
            padding: 10px;
            text-decoration: none;
            border-radius: 5px;
        }

        .sidebar a:hover {
            background: #343a40;
            color: white;
        }

        .card {
            border-radius: 10px;
        }
    </style>

</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <!-- SIDEBAR -->
            <div class="col-md-2 sidebar">
                <h4 class="text-white mb-4"><i class="bi bi-bus-front"></i> Sistema</h4>

                <a href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
                <a href="/clientes/"><i class="bi bi-people"></i> Clientes</a>
                <a href="/motoristas/"><i class="bi bi-person"></i> Motoristas</a>
                <a href="/veiculos/"><i class="bi bi-truck"></i> Veículos</a>
                <a href="/rotas/"><i class="bi bi-map"></i> Rotas</a>
                <a href="/fornecedores/"><i class="bi bi-box"></i> Fornecedores</a>
                <a href="/diario/"><i class="bi bi-journal"></i> Diário</a>
                <form action="{% url 'logout' %}" method="post">
                    {% csrf_token %}
                    <button class="btn btn-outline-light w-100 mt-4">
                        <i class="bi bi-box-arrow-right"></i> Sair
                    </button>
                </form>
            </div>

            <!-- CONTEÚDO -->
            <div class="col-md-10 p-4">
                {% block content %}{% endblock %}
            </div>

        </div>
    </div>

</body>

</html>
