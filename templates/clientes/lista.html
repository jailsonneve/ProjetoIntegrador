{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Clientes</h2>
    <a href="{% url 'criar_cliente' %}" class="btn btn-primary">+ Novo Cliente</a>
</div>

<table class="table table-hover table-bordered">
    <thead class="table-dark">
        <tr>
            <th>Nome</th>
            <th>Telefone</th>
            <th style="width:150px;">Ações</th>
        </tr>
    </thead>
    <tbody>
        {% for c in clientes %}
        <tr>
            <td>{{ c.nome }}</td>
            <td>{{ c.telefone }}</td>
            <td>
                <a href="{% url 'editar_cliente' c.id %}" class="btn btn-warning btn-sm">Editar</a>
                <a href="{% url 'deletar_cliente' c.id %}" class="btn btn-danger btn-sm">Excluir</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3" class="text-center">Nenhum cliente cadastrado</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
