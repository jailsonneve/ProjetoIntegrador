{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4>Cliente</h4>
            </div>

            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <div class="d-flex justify-content-between">
                        <a href="/clientes/" class="btn btn-secondary">Voltar</a>
                        <button class="btn btn-success">Salvar</button>
                    </div>
                </form>
            </div>

        </div>

    </div>
</div>

<script src="https://unpkg.com/imask"></script>

<script>
    IMask(
        document.getElementById('id_cpf'),
        {
            mask: '000.000.000-00'
        }
    );
    IMask(
        document.getElementById('id_telefone'),
        {
            mask: '(00) 00000-0000'
        }
    );
    IMask(
        document.getElementById('id_cnh'),
        {
            mask: '00000000000'
        }
    );
</script>

{% endblock %}
